name: Default Dark
mode: dark

palette:
  base_fg: "#c0caf5"
  base_bg: "#1a1b26"
  selection_fg: "#1a1b26"
  selection_bg: "#7aa2f7"
  accent: "#e0af68"

types:
  integer: { fg: "#7aa2f7" }
  float: { fg: "#73daca" }
  percent: { fg: "#73daca", italic: true }
  boolean: { fg: "#f7768e" }
  string: { fg: "#c0caf5" }
  unicode: { fg: "#9ece6a" }
  multiline: { fg: "#9ece6a", italic: true }
  text: { fg: "#9ece6a", italic: true }
  date: { fg: "#e0af68" }
  time: { fg: "#e0af68" }
  datetime: { fg: "#e0af68" }
  datetimezone: { fg: "#e0af68" }
  bytes: { fg: "#ff9e64" }
  zlib: { fg: "#ff9e64", italic: true }
  gzip: { fg: "#ff9e64", italic: true }
  "null": { fg: "#6b739f", italic: true }
  object: { fg: "#7dcfff", bold: true }
  array: { fg: "#7dcfff", bold: true }

icons:
  search_paths: []
  map: {}
