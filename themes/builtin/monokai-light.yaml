name: Monokai Light JSON
mode: light
palette:
  base_fg: '#272822'
  base_bg: '#F8F8F2'
  alternate_bg: '#f2efe4'
  selection_fg: '#FFFFFF'
  selection_bg: '#FD971F'
  accent: '#A6E22E'
  validation:
    error_fg: '#d13438'
    warning_fg: '#bf6900'
    error_badge: '#d13438'
    warning_badge: '#bf6900'
types:
  integer:
    fg: '#865e3c'
  float:
    fg: '#c64600'
  percent:
    fg: '#c64600'
    italic: true
  int_currency:
    fg: '#865e3c'
    italic: true
  int_units:
    fg: '#865e3c'
    italic: true
  float_currency:
    fg: '#c64600'
    italic: true
  float_units:
    fg: '#c64600'
    italic: true
  boolean:
    fg: '#F92672'
  string:
    fg: '#2E8B57'
  unicode:
    fg: '#2E8B57'
  multiline:
    fg: '#2E8B57'
    italic: true
  text:
    fg: '#2E8B57'
  secret_line:
    fg: '#6C3FBF'
  secret_text:
    fg: '#6C3FBF'
    italic: true
  date:
    fg: '#B58900'
  time:
    fg: '#B58900'
  datetime:
    fg: '#B58900'
  datetimeutc:
    fg: '#B58900'
  datetimezone:
    fg: '#B58900'
  bytes:
    fg: '#6C3FBF'
  zlib:
    fg: '#6C3FBF'
    italic: true
  gzip:
    fg: '#6C3FBF'
    italic: true
  rgb:
    fg: '#1a5fb4'
  rgba:
    fg: '#1a5fb4'
    italic: true
  'null':
    fg: '#999988'
    italic: true
  object:
    fg: '#1f599d'
    bold: true
  array:
    fg: '#1f599d'
    bold: true
icons:
  search_paths:
  - ./mingcute-light
  map:
    integer: hashtag_line
    float: asterisk_2_line
    percent: percentage_line
    int_currency: bank_line
    int_units: ruler_line
    float_currency: bank_line
    float_units: ruler_line
    boolean: choice_line
    string: font_line
    unicode: text_2_line
    multiline: font_size_line
    text: translate_2_line
    secret_line: lock_line
    secret_text: certificate_2_line
    date: calendar_2_line
    time: hours_line
    datetime: calendar_time_add_line
    datetimeutc: globe_fill
    datetimezone: calendar_add_line
    bytes: attachment_line
    zlib: file_zip_line
    gzip: file_zip_line
    rgb: paint_brush_line
    rgba: paint_brush_ai_line
    'null': dot_circle_line
    object: braces_fill
    array: brackets_fill
