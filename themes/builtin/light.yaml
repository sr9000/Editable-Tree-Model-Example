  selection_bg: '#268bd2'
  accent: '#b58900'
  affix_text: '#7f8c8d'
  validation:
    error_fg: '#d13438'
    warning_fg: '#bf6900'
    error_badge: '#d13438'
    warning_badge: '#bf6900'
types:
  integer:
    fg: '#268bd2'
  float:
    fg: '#1f8f89'
  percent:
    fg: '#1f8f89'
    italic: true
  int_currency:
    fg: '#268bd2'
    italic: true
  int_units:
    fg: '#268bd2'
    italic: true
  float_currency:
    fg: '#1f8f89'
    italic: true
  float_units:
    fg: '#1f8f89'
    italic: true
  boolean:
    fg: '#d33682'
  string:
    fg: '#657b83'
  unicode:
    fg: '#6f8100'
  multiline:
    fg: '#6f8100'
    italic: true
  text:
    fg: '#6f8100'
    italic: true
  secret_line:
    fg: '#cb4b16'
  secret_text:
    fg: '#cb4b16'
    italic: true
  date:
    fg: '#946f00'
  time:
    fg: '#946f00'
  datetime:
    fg: '#946f00'
  datetimeutc:
    fg: '#946f00'
  datetimezone:
    fg: '#946f00'
  bytes:
    fg: '#cb4b16'
  zlib:
    fg: '#cb4b16'
    italic: true
  gzip:
    fg: '#cb4b16'
    italic: true
  rgb:
    fg: '#6c71c4'
  rgba:
    fg: '#6c71c4'
    italic: true
  'null':
    fg: '#7f8c8d'
    italic: true
  object:
    fg: '#073642'
    bold: true
  array:
    fg: '#073642'
