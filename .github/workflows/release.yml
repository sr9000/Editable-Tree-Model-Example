name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0). Will be created if it does not exist."
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub release as a pre-release"
        required: false
        default: false
        type: boolean
      draft:
        description: "Create the release as a draft"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.12"
  PYINSTALLER_VERSION: "6.10.0"
  APP_NAME: EditableTreeModel

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: linux-x86_64
            asset_ext: AppImage
          - os: windows-latest
            artifact_name: windows-x86_64
            asset_ext: zip
          - os: macos-latest
            artifact_name: macos-universal
            asset_ext: dmg
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # ----- Linux system deps for Qt + AppImage -----
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1 libegl1 libxkbcommon0 libxkbcommon-x11-0 \
            libdbus-1-3 libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-sync1 libxcb-xfixes0 libxcb-xkb1 \
            libxcb-xinerama0 libfuse2 file desktop-file-utils

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pyinstaller==${PYINSTALLER_VERSION}"

      - name: Run PyInstaller
        shell: bash
        run: |
          pyinstaller --noconfirm --clean EditableTreeModel.spec

      # ----- Windows: zip the one-folder build -----
      - name: Package Windows zip
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = "${{ inputs.tag }}"
          $asset = "${{ env.APP_NAME }}-$tag-${{ matrix.artifact_name }}.zip"
          Compress-Archive -Path "dist/${{ env.APP_NAME }}/*" -DestinationPath "dist/$asset"
          "ASSET_PATH=dist/$asset" | Out-File -FilePath $env:GITHUB_ENV -Append
          "ASSET_NAME=$asset" | Out-File -FilePath $env:GITHUB_ENV -Append

      # ----- macOS: build a DMG from the .app bundle -----
      - name: Package macOS DMG
        if: runner.os == 'macOS'
        shell: bash
        run: |
          tag="${{ inputs.tag }}"
          asset="${APP_NAME}-${tag}-${{ matrix.artifact_name }}.dmg"
          mkdir -p dist/dmg-staging
          cp -R "dist/${APP_NAME}.app" dist/dmg-staging/
          ln -s /Applications dist/dmg-staging/Applications || true
          hdiutil create -volname "${APP_NAME}" \
            -srcfolder dist/dmg-staging \
            -ov -format ULFO \
            "dist/${asset}"
          echo "ASSET_PATH=dist/${asset}" >> "$GITHUB_ENV"
          echo "ASSET_NAME=${asset}" >> "$GITHUB_ENV"

      # ----- Linux: turn the PyInstaller output into an AppImage -----
      - name: Package Linux AppImage
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.tag }}"
          asset="${APP_NAME}-${tag}-${{ matrix.artifact_name }}.AppImage"

          APPDIR="dist/${APP_NAME}.AppDir"
          rm -rf "${APPDIR}"
          mkdir -p "${APPDIR}/usr/bin"
          cp -R "dist/${APP_NAME}/." "${APPDIR}/usr/bin/"

          install -m 0755 packaging/linux/AppRun "${APPDIR}/AppRun"
          install -m 0644 packaging/linux/EditableTreeModel.desktop \
            "${APPDIR}/EditableTreeModel.desktop"
          install -m 0644 packaging/linux/editabletreemodel.svg \
            "${APPDIR}/editabletreemodel.svg"
          # AppImage also requires a top-level .DirIcon symlink/file.
          cp packaging/linux/editabletreemodel.svg "${APPDIR}/.DirIcon"

          # Fetch appimagetool.
          curl -L -o appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          # AppImage on GH runners: --appimage-extract-and-run avoids FUSE issues.
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run \
            "${APPDIR}" "dist/${asset}"

          echo "ASSET_PATH=dist/${asset}" >> "$GITHUB_ENV"
          echo "ASSET_NAME=${asset}" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.artifact_name }}
          path: ${{ env.ASSET_PATH }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List collected assets
        run: |
          find artifacts -type f | sort

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/**/*.zip
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
